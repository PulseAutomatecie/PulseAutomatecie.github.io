<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Animation d'entrée fluide */
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
            animation: fadeSlide 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .tech-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow {
            box-shadow: 0 0 40px -10px rgba(6, 182, 212, 0.2);
        }
    </style>
    <title>PulseAutomate - Architecture Premium</title>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col justify-center items-center relative overflow-hidden">
    
    <div class="absolute inset-0 z-0 opacity-30">
        <div class="absolute top-0 -left-4 w-72 h-72 bg-cyan-600 rounded-full mix-blend-multiply filter blur-[128px]"></div>
        <div class="absolute -bottom-8 right-20 w-72 h-72 bg-blue-600 rounded-full mix-blend-multiply filter blur-[128px]"></div>
    </div>

    <main class="w-full max-w-2xl px-6 relative z-10">
        <div class="p-[1px] bg-gradient-to-r from-cyan-500 to-blue-600 rounded-[2rem] shadow-2xl glow animate-in">
            <div class="tech-card p-10 md:p-14 rounded-[1.9rem]">
                
                <div id="content-wrapper" class="space-y-6">
                    <!-- INJECTION_POINT -->
                </div>

            </div>
        </div>
    </main>

    <footer class="mt-12 text-slate-500 text-xs tracking-widest uppercase">
        PulseAutomate &bull; Système Automatisé &bull; 2026
    </footer>

</body>
</html>
