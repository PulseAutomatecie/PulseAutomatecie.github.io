<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseAutomate | Solutions Digitales</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Orbitron', sans-serif; background: #0f0f0f; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; border: 1px solid #00ffcc; padding: 3rem; border-radius: 20px; background: #1a1a1a; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
        h1 { color: #00ffcc; text-transform: uppercase; letter-spacing: 4px; }
        button { background: #00ffcc; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PulseAutomate</h1>
        <p>Expertise en automatisation et solutions digitales.</p>
        <button id="checkout-button">DÉCOUVRIR NOS SOLUTIONS</button>
    </div>

    <script src="https://js.stripe.com/v3"></script>
    <script>
        // Remplace par ta vraie clé publique Stripe
        const stripe = Stripe('pk_test_51TgQQn97qkx4WJ1pnGtlZsfMEFJO3LRgDEgXen8fBEX4N5dVM6Ert8RwaCwEZL3SILCKBPBNkHQYJOcbe8naMnKy00wWlhm2Py'); 
        const button = document.getElementById('checkout-button');

        button.addEventListener('click', async () => {
            try {
                // Appel vers ton serveur sur ton IP publique
                const response = await fetch('http://213.199.46.218:5001/create-checkout-session', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const session = await response.json();
                
                if (session.id) {
                    stripe.redirectToCheckout({ sessionId: session.id });
                } else {
                    console.error("Erreur: Aucun ID de session reçu", session);
                }
            } catch (error) {
                console.error("Erreur lors de la connexion au serveur:", error);
                alert("Impossible de contacter le serveur de paiement. Vérifie que le serveur est bien lancé sur le VPS.");
            }
        });
    </script>
</body>
</html>
